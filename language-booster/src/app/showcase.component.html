<div class="container">
  <p-toast></p-toast>

  <h1>PrimeNG Showcase</h1>
  <p>Learning PrimeNG step by step.</p>

  <div class="grid">
    <!-- Basic Inputs -->
    <p-card header="Inputs & Buttons">
      <div class="field">
        <label for="username">Username</label>
        <input pInputText id="username" [(ngModel)]="textValue" placeholder="Type something..." class="w-full" />
      </div>

      <div class="field">
        <label for="date">Pick a Date</label>
        <p-datepicker id="date" [(ngModel)]="dateValue" class="w-full"></p-datepicker>
      </div>

      <div class="flex gap-2">
        <p-button label="Submit" icon="pi pi-check" (onClick)="showSuccess()"></p-button>
        <p-button label="Secondary" severity="secondary" icon="pi pi-times"></p-button>
      </div>

      <p *ngIf="textValue" class="mt-2">You typed: <strong>{{ textValue }}</strong></p>
    </p-card>

    <!-- Data Table -->
    <p-card header="Data Table" class="col-span-2">
      <p-table [value]="products" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
          <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-product>
          <tr>
            <td>{{ product.code }}</td>
            <td>{{ product.name }}</td>
            <td>{{ product.category }}</td>
            <td>{{ product.quantity }}</td>
          </tr>
        </ng-template>
      </p-table>
    </p-card>
  </div>
</div>
